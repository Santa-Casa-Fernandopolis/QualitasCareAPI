databaseChangeLog:
  - changeSet:
      id: v37-001-cme-instrumentos-fisicos
      author: codex
      changes:
        - createTable:
            tableName: cme_instrumentos_fisicos
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_cme_instrumentos_fisicos
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: instrumento_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: identificador_unico
                  type: VARCHAR(80)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(30)
                  defaultValue: ATIVO
                  constraints:
                    nullable: false
              - column:
                  name: localizacao
                  type: VARCHAR(120)
              - column:
                  name: observacoes
                  type: VARCHAR(800)
              - column:
                  name: ativo
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: cme_instrumentos_fisicos
            columnNames: tenant_id, identificador_unico
            constraintName: uk_cme_instr_fis_tenant_ident
        - addForeignKeyConstraint:
            baseTableName: cme_instrumentos_fisicos
            baseColumnNames: tenant_id
            referencedTableName: tenants
            referencedColumnNames: id
            constraintName: fk_cme_instr_fis_tenant
        - addForeignKeyConstraint:
            baseTableName: cme_instrumentos_fisicos
            baseColumnNames: instrumento_id
            referencedTableName: cme_instrumentos
            referencedColumnNames: id
            constraintName: fk_cme_instr_fis_instr
        - createIndex:
            tableName: cme_instrumentos_fisicos
            indexName: ix_cme_instr_fis_tenant_status
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: status

