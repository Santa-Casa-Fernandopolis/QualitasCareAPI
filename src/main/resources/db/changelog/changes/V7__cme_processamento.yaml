databaseChangeLog:
  - changeSet:
      id: V7-1
      author: qualitascare
      changes:
        - createTable:
            tableName: cme_recebimentos
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: data_hora
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: setor_origem_id
                  type: BIGINT
              - column:
                  name: responsavel_id
                  type: BIGINT
              - column:
                  name: quantidade_itens
                  type: INTEGER
              - column:
                  name: condicao_descricao
                  type: VARCHAR(255)
              - column:
                  name: status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: observacoes
                  type: VARCHAR(255)
        - addForeignKeyConstraint:
            baseTableName: cme_recebimentos
            baseColumnNames: tenant_id
            referencedTableName: tenants
            referencedColumnNames: id
            constraintName: fk_cme_recebimento_tenant
        - addForeignKeyConstraint:
            baseTableName: cme_recebimentos
            baseColumnNames: setor_origem_id
            referencedTableName: cme_setores
            referencedColumnNames: id
            constraintName: fk_cme_recebimento_setor_origem
        - addForeignKeyConstraint:
            baseTableName: cme_recebimentos
            baseColumnNames: responsavel_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_cme_recebimento_responsavel
        - createIndex:
            tableName: cme_recebimentos
            indexName: ix_recebimento_tenant_data
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: data_hora
        - createIndex:
            tableName: cme_recebimentos
            indexName: ix_recebimento_tenant_status
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: status
        - createTable:
            tableName: cme_recebimento_evidencias
            columns:
              - column:
                  name: recebimento_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: evidencia_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: cme_recebimento_evidencias
            columnNames: recebimento_id, evidencia_id
            constraintName: pk_cme_recebimento_evidencias
        - addForeignKeyConstraint:
            baseTableName: cme_recebimento_evidencias
            baseColumnNames: recebimento_id
            referencedTableName: cme_recebimentos
            referencedColumnNames: id
            constraintName: fk_cme_recebimento_evidencia_rec
        - addForeignKeyConstraint:
            baseTableName: cme_recebimento_evidencias
            baseColumnNames: evidencia_id
            referencedTableName: evidencias_arquivo
            referencedColumnNames: id
            constraintName: fk_cme_recebimento_evidencia_file

