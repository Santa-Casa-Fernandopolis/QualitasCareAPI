                  constraints:
                    nullable: false
              - column:
                  name: clinical_document_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: patient_master_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
              - column:
                  name: user_name
                  type: VARCHAR(160)
              - column:
                  name: action
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: ip_address
                  type: VARCHAR(80)
              - column:
                  name: user_agent
                  type: VARCHAR(500)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: same_document_access_logs
            baseColumnNames: tenant_id
