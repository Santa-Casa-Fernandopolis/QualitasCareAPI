            baseTableName: same_document_access_logs
            baseColumnNames: patient_master_id
            referencedTableName: same_patient_master
            referencedColumnNames: id
            constraintName: fk_same_access_log_patient
        - createIndex:
            tableName: same_document_access_logs
            indexName: ix_same_access_log_document_date
            columns:
