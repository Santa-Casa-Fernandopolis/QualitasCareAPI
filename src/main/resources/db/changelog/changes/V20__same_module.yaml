              - column:
                  name: created_at
        - createIndex:
            tableName: same_document_access_logs
            indexName: ix_same_access_log_patient_date
            columns:
              - column:
                  name: patient_master_id
              - column:
                  name: created_at
        - createIndex:
            tableName: same_document_access_logs
            indexName: ix_same_access_log_tenant_user_date
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: user_id
              - column:
                  name: created_at

  # ============================================================
  # V20-5  same_legacy_integration_sources
  # ============================================================
  - changeSet:
      id: V20-5
      author: qualitascare
      changes:
        - createTable:
            tableName: same_legacy_integration_sources
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
              - column:
                  name: source_system
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: jdbc_url
                  type: VARCHAR(500)
              - column:
                  name: username
                  type: VARCHAR(120)
              - column:
                  name: encrypted_password
                  type: VARCHAR(500)
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - addUniqueConstraint:
            tableName: same_legacy_integration_sources
            columnNames: tenant_id, source_system, name
            constraintName: uk_same_legacy_source_tenant_system_name
        - addForeignKeyConstraint:
            baseTableName: same_legacy_integration_sources
            baseColumnNames: tenant_id
            referencedTableName: tenants
            referencedColumnNames: id
            constraintName: fk_same_legacy_source_tenant

