databaseChangeLog:

  # ============================================================
  # V19-1  pgrss_grupos_residuo
  # ============================================================
  - changeSet:
      id: V19-1
      author: qualitascare
      changes:
        - createTable:
            tableName: pgrss_grupos_residuo
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: codigo
                  type: VARCHAR(5)
                  constraints:
                    nullable: false
              - column:
                  name: nome
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: descricao
                  type: VARCHAR(500)
              - column:
                  name: risco
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: padrao_cor_identificacao
                  type: VARCHAR(60)
              - column:
                  name: requer_tratamento
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: ativo
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: pgrss_grupos_residuo
            columnNames: tenant_id, codigo
            constraintName: uk_pgrss_gr_tenant_codigo
        - addForeignKeyConstraint:
            baseTableName: pgrss_grupos_residuo
            baseColumnNames: tenant_id
            referencedTableName: tenants
            referencedColumnNames: id
            constraintName: fk_pgrss_gr_tenant
        - createIndex:
            tableName: pgrss_grupos_residuo
            indexName: ix_pgrss_gr_tenant
            columns:
              - column:
                  name: tenant_id

