spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/db_qualitascare_dev
    username: postgres
    password: postdba
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: QualitasPool

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update          # DEV: Hibernate cuida do schema
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  devtools:
    add-properties: true

  liquibase:
    enabled: false              # DEV: desliga liquibase

cors:
  allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175,http://[::1]:5173,http://[::1]:5174,http://[::1]:5175,http://192.168.*.*:5173,http://192.168.*.*:5174,http://192.168.*.*:5175

# Criptografia AES para valores SECRET em sys_configuracoes
# NUNCA versionar em produção — usar variáveis de ambiente ENCRYPT_KEY e ENCRYPT_SALT
app:
  encrypt:
    key: qualitascare-dev-encrypt-key-xyz
    salt: cafebabe00000000       # hex string, mínimo 16 chars
